<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0F0F1A" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="عاداتي" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <title>مُتابع العادات</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, #0F0F1A 0%, #1A1A2E 50%, #16213E 100%);
      min-height: 100vh; color: #fff;
      overscroll-behavior: none;
    }
    input, button { font-family: inherit; }
    @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .habit-card { animation: fadeIn 0.3s ease forwards; }
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const DAYS = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
const MONTHS = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
const ICONS = ["🏃","📚","💧","🧘","🥗","😴","✍️","🎯","💪","🎨","🎵","🌿","🧹","🐕","💊","🎮"];
const COLORS = [
  { bg: "#FF6B6B" }, { bg: "#4ECDC4" }, { bg: "#45B7D1" }, { bg: "#96CEB4" },
  { bg: "#FFEAA7" }, { bg: "#DDA0DD" }, { bg: "#98D8C8" }, { bg: "#F7DC6F" },
  { bg: "#FF8C69" }, { bg: "#87CEEB" }
];

const formatDateKey = (date) => date.toISOString().split("T")[0];
const getLast7Days = () => {
  const today = new Date();
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(today);
    d.setDate(today.getDate() - 6 + i);
    return d;
  });
};

function CircleProgress({ percent, size, stroke, color }) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (percent / 100) * circ;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
        transform={`rotate(-90 ${size/2} ${size/2})`}
        style={{transition:"stroke-dashoffset 0.7s cubic-bezier(.4,0,.2,1)"}}/>
      <text x={size/2} y={size/2 - 4} textAnchor="middle" fill={color} fontSize="13" fontWeight="800">{percent}%</text>
      <text x={size/2} y={size/2 + 12} textAnchor="middle" fill="rgba(255,255,255,0.5)" fontSize="9">إنجاز</text>
    </svg>
  );
}

function App() {
  const today = new Date();
  const todayKey = formatDateKey(today);
  const days = getLast7Days();

  const [habits, setHabits] = useState(() => {
    try {
      const s = localStorage.getItem('habits_v3');
      return s ? JSON.parse(s) : [
        { id: 1, name: "شرب الماء", icon: "💧", color: COLORS[2], completions: {} },
        { id: 2, name: "القراءة", icon: "📚", color: COLORS[0], completions: {} },
        { id: 3, name: "التمرين", icon: "🏃", color: COLORS[1], completions: {} },
      ];
    } catch(e) { return []; }
  });

  const [showAdd, setShowAdd] = useState(false);
  const [newHabit, setNewHabit] = useState({ name: "", icon: "🎯", color: COLORS[0] });
  const [activeTab, setActiveTab] = useState("today");

  useEffect(() => {
    try { localStorage.setItem('habits_v3', JSON.stringify(habits)); } catch(e) {}
  }, [habits]);

  const toggle = (habitId, dateKey) => {
    setHabits(prev => prev.map(h => {
      if (h.id !== habitId) return h;
      const c = { ...h.completions };
      c[dateKey] = !c[dateKey];
      return { ...h, completions: c };
    }));
  };

  const addHabit = () => {
    if (!newHabit.name.trim()) return;
    setHabits(prev => [...prev, { id: Date.now(), ...newHabit, completions: {} }]);
    setNewHabit({ name: "", icon: "🎯", color: COLORS[0] });
    setShowAdd(false);
  };

  const deleteHabit = (id) => { if(confirm("حذف هذه العادة؟")) setHabits(prev => prev.filter(h => h.id !== id)); };

  const getWeekProgress = (habit) => Math.round(days.filter(d => habit.completions[formatDateKey(d)]).length / 7 * 100);
  const todayDone = habits.filter(h => h.completions[todayKey]).length;
  const todayPct = habits.length ? Math.round(todayDone / habits.length * 100) : 0;
  const weekPct = habits.length ? Math.round(habits.reduce((a,h) => a + getWeekProgress(h), 0) / habits.length) : 0;

  const cardStyle = { background:"rgba(255,255,255,0.05)", borderRadius:20, padding:16, border:"1px solid rgba(255,255,255,0.08)", display:"flex", alignItems:"center", gap:12, flex:1 };

  return (
    <div style={{ minHeight:"100vh" }}>
      {/* Header */}
      <div style={{ background:"rgba(255,255,255,0.03)", backdropFilter:"blur(20px)", borderBottom:"1px solid rgba(255,255,255,0.08)", padding:"max(20px, env(safe-area-inset-top)) 20px 16px", position:"sticky", top:0, zIndex:100 }}>
        <div style={{ maxWidth:500, margin:"0 auto", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>
            <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)" }}>{DAYS[today.getDay()]}، {today.getDate()} {MONTHS[today.getMonth()]}</div>
            <div style={{ fontSize:21, fontWeight:800, marginTop:2 }}>مُتابع العادات ✨</div>
          </div>
          <button onClick={() => setShowAdd(true)} style={{ background:"linear-gradient(135deg,#4ECDC4,#45B7D1)", border:"none", borderRadius:14, width:44, height:44, cursor:"pointer", fontSize:24, color:"#fff", boxShadow:"0 4px 20px rgba(78,205,196,0.45)", display:"flex", alignItems:"center", justifyContent:"center" }}>+</button>
        </div>
      </div>

      <div style={{ maxWidth:500, margin:"0 auto", padding:"18px 14px max(20px, env(safe-area-inset-bottom))" }}>
        {/* Stats */}
        <div style={{ display:"flex", gap:12, marginBottom:20 }}>
          <div style={cardStyle}>
            <CircleProgress percent={todayPct} size={62} stroke={6} color="#4ECDC4"/>
            <div>
              <div style={{ fontSize:10, color:"rgba(255,255,255,0.4)", fontWeight:600 }}>اليوم</div>
              <div style={{ fontSize:18, fontWeight:800 }}>{todayDone}/{habits.length}</div>
              <div style={{ fontSize:10, color:"rgba(255,255,255,0.4)" }}>مكتملة</div>
            </div>
          </div>
          <div style={cardStyle}>
            <CircleProgress percent={weekPct} size={62} stroke={6} color="#FF6B6B"/>
            <div>
              <div style={{ fontSize:10, color:"rgba(255,255,255,0.4)", fontWeight:600 }}>الأسبوع</div>
              <div style={{ fontSize:18, fontWeight:800 }}>{weekPct}%</div>
              <div style={{ fontSize:10, color:"rgba(255,255,255,0.4)" }}>الإنجاز الكلي</div>
            </div>
          </div>
        </div>

        {/* Tabs */}
        <div style={{ display:"flex", background:"rgba(255,255,255,0.05)", borderRadius:14, padding:4, marginBottom:18, border:"1px solid rgba(255,255,255,0.08)" }}>
          {[["today","اليوم"],["week","الأسبوع"]].map(([key,label]) => (
            <button key={key} onClick={() => setActiveTab(key)} style={{ flex:1, padding:"10px 0", border:"none", cursor:"pointer", borderRadius:10, fontWeight:700, fontSize:14, background:activeTab===key?"linear-gradient(135deg,#4ECDC4,#45B7D1)":"transparent", color:activeTab===key?"#fff":"rgba(255,255,255,0.4)", boxShadow:activeTab===key?"0 4px 15px rgba(78,205,196,0.35)":"none", transition:"all 0.3s" }}>{label}</button>
          ))}
        </div>

        {habits.length === 0 && (
          <div style={{ textAlign:"center", padding:"60px 20px", color:"rgba(255,255,255,0.3)" }}>
            <div style={{ fontSize:52, marginBottom:14 }}>🎯</div>
            <div style={{ fontSize:16, fontWeight:700 }}>لا توجد عادات بعد</div>
            <div style={{ fontSize:13, marginTop:8 }}>اضغط + لإضافة عادة جديدة</div>
          </div>
        )}

        {/* Today */}
        {activeTab === "today" && (
          <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
            {habits.map((habit, idx) => {
              const done = habit.completions[todayKey];
              return (
                <div key={habit.id} className="habit-card" style={{ animationDelay:idx*0.05+"s" }}>
                  <div onClick={() => toggle(habit.id, todayKey)} style={{ background:done?`${habit.color.bg}18`:"rgba(255,255,255,0.04)", borderRadius:18, padding:"14px 16px", border:`1px solid ${done?habit.color.bg+"55":"rgba(255,255,255,0.08)"}`, display:"flex", alignItems:"center", gap:14, cursor:"pointer", position:"relative", transition:"all 0.25s" }}>
                    <div style={{ width:46, height:46, borderRadius:13, background:done?habit.color.bg:"rgba(255,255,255,0.08)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, flexShrink:0, boxShadow:done?`0 4px 15px ${habit.color.bg}66`:"none", transition:"all 0.25s" }}>{habit.icon}</div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontWeight:700, fontSize:15, opacity:done?0.6:1, textDecoration:done?"line-through":"none" }}>{habit.name}</div>
                      <div style={{ fontSize:11, color:"rgba(255,255,255,0.4)", marginTop:3 }}>{done?"✅ أُنجز اليوم!":"اضغط للإتمام"}</div>
                    </div>
                    <div style={{ width:28, height:28, borderRadius:8, flexShrink:0, background:done?habit.color.bg:"rgba(255,255,255,0.07)", border:`2px solid ${done?"transparent":"rgba(255,255,255,0.2)"}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:15, fontWeight:700, boxShadow:done?`0 2px 10px ${habit.color.bg}55`:"none", transition:"all 0.25s" }}>{done?"✓":""}</div>
                    <button onClick={e => { e.stopPropagation(); deleteHabit(habit.id); }} style={{ position:"absolute", top:8, left:8, background:"rgba(255,80,80,0.15)", border:"none", borderRadius:6, width:22, height:22, cursor:"pointer", fontSize:11, color:"rgba(255,100,100,0.8)", display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* Week */}
        {activeTab === "week" && (
          <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
            {habits.map((habit, idx) => {
              const progress = getWeekProgress(habit);
              const doneDays = days.filter(d => habit.completions[formatDateKey(d)]).length;
              return (
                <div key={habit.id} className="habit-card" style={{ animationDelay:idx*0.06+"s", background:"rgba(255,255,255,0.04)", borderRadius:20, padding:16, border:"1px solid rgba(255,255,255,0.08)" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:12 }}>
                    <div style={{ width:40, height:40, borderRadius:12, background:habit.color.bg+"28", display:"flex", alignItems:"center", justifyContent:"center", fontSize:20 }}>{habit.icon}</div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontWeight:700, fontSize:14 }}>{habit.name}</div>
                      <div style={{ fontSize:11, color:"rgba(255,255,255,0.4)", marginTop:2 }}>{doneDays} من 7 أيام</div>
                    </div>
                    <div style={{ fontSize:18, fontWeight:800, color:progress>=80?"#4ECDC4":progress>=50?"#FFEAA7":"#FF6B6B" }}>{progress}%</div>
                  </div>
                  <div style={{ height:7, background:"rgba(255,255,255,0.08)", borderRadius:4, marginBottom:12, overflow:"hidden" }}>
                    <div style={{ height:"100%", width:progress+"%", background:`linear-gradient(90deg,${habit.color.bg},${habit.color.bg}88)`, borderRadius:4, transition:"width 0.7s cubic-bezier(.4,0,.2,1)" }}/>
                  </div>
                  <div style={{ display:"flex", gap:5 }}>
                    {days.map((d, i) => {
                      const key = formatDateKey(d);
                      const isToday = key === todayKey;
                      const done = habit.completions[key];
                      return (
                        <div key={i} onClick={() => toggle(habit.id, key)} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:5, cursor:"pointer" }}>
                          <div style={{ fontSize:9, color:isToday?habit.color.bg:"rgba(255,255,255,0.3)", fontWeight:isToday?800:400 }}>{DAYS[d.getDay()].slice(0,2)}</div>
                          <div style={{ width:"100%", aspectRatio:"1", borderRadius:9, background:done?habit.color.bg:"rgba(255,255,255,0.06)", border:`1.5px solid ${isToday?habit.color.bg:done?"transparent":"rgba(255,255,255,0.1)"}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:700, boxShadow:done?`0 3px 10px ${habit.color.bg}55`:"none", transition:"all 0.2s" }}>
                            {done?"✓":<span style={{ fontSize:8, color:"rgba(255,255,255,0.2)" }}>{d.getDate()}</span>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Modal */}
      {showAdd && (
        <div onClick={() => setShowAdd(false)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", backdropFilter:"blur(12px)", zIndex:200, display:"flex", alignItems:"flex-end", justifyContent:"center" }}>
          <div onClick={e => e.stopPropagation()} style={{ background:"linear-gradient(180deg,#1E2040,#161830)", borderRadius:"24px 24px 0 0", padding:"24px 18px max(40px, env(safe-area-inset-bottom))", width:"100%", maxWidth:500, border:"1px solid rgba(255,255,255,0.1)", borderBottom:"none", animation:"slideUp 0.35s cubic-bezier(.4,0,.2,1)" }}>
            <div style={{ fontWeight:800, fontSize:17, marginBottom:18, textAlign:"center" }}>إضافة عادة جديدة 🌟</div>
            <input value={newHabit.name} onChange={e => setNewHabit(p=>({...p,name:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addHabit()} placeholder="اسم العادة..." style={{ width:"100%", padding:"13px 15px", borderRadius:13, background:"rgba(255,255,255,0.07)", border:"1.5px solid rgba(255,255,255,0.12)", color:"#fff", fontSize:15, outline:"none", marginBottom:16, textAlign:"right" }}/>
            <div style={{ fontSize:11, color:"rgba(255,255,255,0.4)", marginBottom:8, fontWeight:700 }}>اختر أيقونة</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:7, marginBottom:16 }}>
              {ICONS.map(icon => <button key={icon} onClick={() => setNewHabit(p=>({...p,icon}))} style={{ width:42, height:42, borderRadius:11, border:"none", cursor:"pointer", fontSize:20, background:newHabit.icon===icon?"rgba(78,205,196,0.3)":"rgba(255,255,255,0.07)", outline:newHabit.icon===icon?"2px solid #4ECDC4":"none" }}>{icon}</button>)}
            </div>
            <div style={{ fontSize:11, color:"rgba(255,255,255,0.4)", marginBottom:8, fontWeight:700 }}>اختر لوناً</div>
            <div style={{ display:"flex", gap:9, flexWrap:"wrap", marginBottom:22 }}>
              {COLORS.map((c,i) => <button key={i} onClick={() => setNewHabit(p=>({...p,color:c}))} style={{ width:30, height:30, borderRadius:8, border:"none", cursor:"pointer", background:c.bg, outline:newHabit.color.bg===c.bg?"3px solid #fff":"none", outlineOffset:2, transform:newHabit.color.bg===c.bg?"scale(1.2)":"scale(1)", transition:"all 0.15s" }}/>)}
            </div>
            <button onClick={addHabit} disabled={!newHabit.name.trim()} style={{ width:"100%", padding:"14px", borderRadius:15, border:"none", background:newHabit.name.trim()?"linear-gradient(135deg,#4ECDC4,#45B7D1)":"rgba(255,255,255,0.1)", color:"#fff", fontSize:16, fontWeight:700, cursor:newHabit.name.trim()?"pointer":"not-allowed", boxShadow:newHabit.name.trim()?"0 6px 25px rgba(78,205,196,0.45)":"none", transition:"all 0.3s" }}>إضافة العادة ✨</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').then(() => console.log('SW registered')).catch(console.error);
  }
</script>
</body>
</html>
